name: Build iOS IPA
on: workflow_dispatch

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Native iOS Project (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          # Знаходимо назву робочого простору (workspace)
          WORKSPACE=$(ls | grep .xcworkspace | head -1)
          SCHEME=$(ls | grep .xcworkspace | sed 's/.xcworkspace//' | head -1)
          
          # Збираємо код без перевірки сертифікатів Apple
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath ../build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY=""

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r my-anime-player.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-anime-player-ipa
          path: my-anime-player.ipa